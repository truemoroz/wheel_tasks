<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Dark background -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>

  <!-- Grid rings -->
  <circle cx="32" cy="32" r="8.4"  fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="16.8" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="25.2" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <circle cx="32" cy="32" r="28"   fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>

  <!-- Axis spokes -->
  <line x1="32" y1="4"  x2="32" y2="60" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>
  <line x1="4"  y1="32" x2="60" y2="32" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>

  <!-- Segment 0 (0–90°): blue -->
  <path d="M 32 32 L 32 12.4 A 19.6 19.6 0 0 1 51.6 32 Z"
        fill="rgb(59,130,246)" fill-opacity="0.8"
        stroke="rgb(59,130,246)" stroke-width="0.8" stroke-opacity="1"/>

  <!-- Segment 1 (90–180°): purple -->
  <path d="M 32 32 L 57.2 32 A 25.2 25.2 0 0 1 32 57.2 Z"
        fill="rgb(168,85,247)" fill-opacity="0.8"
        stroke="rgb(168,85,247)" stroke-width="0.8" stroke-opacity="1"/>

  <!-- Segment 2 (180–270°): green -->
  <path d="M 32 32 L 32 48.8 A 16.8 16.8 0 0 1 15.2 32 Z"
        fill="rgb(34,197,94)" fill-opacity="0.8"
        stroke="rgb(34,197,94)" stroke-width="0.8" stroke-opacity="1"/>

  <!-- Segment 3 (270–360°): indigo -->
  <path d="M 32 32 L 9.6 32 A 22.4 22.4 0 0 1 32 9.6 Z"
        fill="rgb(99,102,241)" fill-opacity="0.8"
        stroke="rgb(99,102,241)" stroke-width="0.8" stroke-opacity="1"/>

  <!-- Outer border ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
</svg>

